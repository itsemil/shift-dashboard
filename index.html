<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Manager - Task Submission</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 10px; width: 100%; background-color: #0056b3; color: white; border: none; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #004494; }
        #message { margin-top: 15px; font-weight: bold; color: green; }
    </style>
</head>
<body>

    <h2>Assign Shift Task</h2>
    <form id="taskForm">
        <label for="title">Task Title:</label>
        <input type="text" id="title" required placeholder="e.g., Check pending cardboard shipments">

        <label for="description">Details:</label>
        <textarea id="description" rows="4" required placeholder="What needs to be done?"></textarea>

        <label for="priority">Urgency Level:</label>
        <select id="priority">
            <option value="1">Priority 1: Critical - This Shift (Red)</option>
            <option value="2">Priority 2: High - 24 Hours (Orange)</option>
            <option value="3">Priority 3: Medium - End of Week (Yellow)</option>
            <option value="4">Priority 4: Ongoing / Backlog (Grey)</option>
        </select>

        <button type="submit">Submit to Dashboard</button>
    </form>
    <div id="message"></div>

    <script type="module">
        // Import functions from the Firebase CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // TODO: Replace with your actual Firebase project config
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Handle form submission
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent page refresh
            
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const priority = Number(document.getElementById('priority').value);

            try {
                // Add a new document to the "shiftTasks" collection
                await addDoc(collection(db, "shiftTasks"), {
                    title: title,
                    description: description,
                    priority: priority,
                    status: "Pending",
                    createdAt: serverTimestamp()
                });

                document.getElementById('message').innerText = "Task successfully added to the dashboard!";
                document.getElementById('taskForm').reset(); // Clear the form

                // Hide success message after 3 seconds
                setTimeout(() => { document.getElementById('message').innerText = ""; }, 3000);

            } catch (error) {
                console.error("Error adding document: ", error);
                document.getElementById('message').innerText = "Error adding task. Check console.";
                document.getElementById('message').style.color = "red";
            }
        });
    </script>
</body>
</html>
